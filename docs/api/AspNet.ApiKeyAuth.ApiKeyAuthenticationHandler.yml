- h2: Examples
- markdown: >-
    The handler can be configured in the ASP.NET Core pipeline via an authentication scheme

    using <code>AddApiKey</code> defined in the <code>AuthenticationBuilderExtensions</code>.
- h2: Remarks
- markdown: >-
    This class derives from <xref href="Microsoft.AspNetCore.Authentication.AuthenticationHandler%601" data-throw-if-not-resolved="false"></xref> and implements custom authentication logic

    for requests carrying API keys in their headers. If the API key in the request matches the pre-configured keys,

    the handler authenticates the request and assigns claims to the authenticated user.
