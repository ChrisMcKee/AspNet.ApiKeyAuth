name: Publish to NuGet

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (e.g. 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release AuthApi.slnx

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal tests/AspNet.ApiKeyAuth.Tests/AspNet.ApiKeyAuth.Tests.csproj

      - name: Pack
        run: dotnet pack src/AspNet.ApiKeyAuth/AspNet.ApiKeyAuth.csproj --no-build --configuration Release -p:PackageVersion="$PACKAGE_VERSION" --output ./artifacts
        env:
          PACKAGE_VERSION: ${{ inputs.version }}

      - name: NuGet login (Trusted Publishing)
        id: login
        uses: nuget/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
